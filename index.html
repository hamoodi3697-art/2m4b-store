<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2M4B Store</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}
header {
    background: linear-gradient(90deg, #ff0000, #000);
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}
.products {
    display: flex;
    justify-content: center;
    padding: 20px;
}
.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 15px red;
    width: 300px;
}
.slider {
    position: relative;
    overflow: hidden;
}
.slider img {
    width: 100%;
    border-radius: 10px;
}
.dots {
    text-align: center;
    margin-top: 8px;
}
.dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: gray;
    border-radius: 50%;
    margin: 3px;
}
.active {
    background: red;
}
button {
    background: red;
    border: none;
    padding: 10px;
    color: white;
    cursor: pointer;
    border-radius: 5px;
    margin-top: 10px;
}
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}
.modal img {
    width: 90%;
    max-width: 400px;
}
</style>
</head>
<body><header>🐺 2M4B STORE</header><div class="products">
<div class="card"><div class="slider" id="slider">
<img src="images/account3.jpg" id="slideImage" onclick="openImage()">
</div><div class="dots" id="dots"></div><h3>حساب فورت نايت مميز</h3>
<p style="color: gold; font-size: 18px;">460﷼</p>
<button onclick="buy()">شراء</button></div>
</div><div class="modal" id="modal" onclick="closeImage()">
<img id="modalImg">
</div><script>
let images = [
"images/account3.jpg",
"images/account1.jpg",
"images/account2.jpg",
"images/account4.jpg",
"images/account5.jpg",
"images/account6.jpg",
"images/account7.jpg",
"images/account8.jpg"
];

let index = 0;
let startX = 0;

const slider = document.getElementById("slider");
const img = document.getElementById("slideImage");
const dotsContainer = document.getElementById("dots");

// create dots
images.forEach((_, i) => {
    let d = document.createElement("span");
    d.classList.add("dot");
    if(i === 0) d.classList.add("active");
    dotsContainer.appendChild(d);
});

function updateDots(){
    let dots = document.querySelectorAll(".dot");
    dots.forEach(d => d.classList.remove("active"));
    dots[index].classList.add("active");
}

slider.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", (e) => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
        index = (index + 1) % images.length;
    } else if (endX - startX > 50) {
        index = (index - 1 + images.length) % images.length;
    }

    img.src = images[index];
    updateDots();
});

// zoom
function openImage(){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = images[index];
}

function closeImage(){
    document.getElementById("modal").style.display = "none";
}

function buy() {
    alert("جارٍ تحويلك إلى الانستقرام...");
    window.location.href = "https://instagram.com/2m4b";
}
</script></body>
</html>
