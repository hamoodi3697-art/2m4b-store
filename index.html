<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2M4B Store</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}
header {
    background: linear-gradient(90deg, #ff0000, #000);
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}
nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: #111;
    padding: 10px;
}
nav a {
    color: white;
    text-decoration: none;
}
section {
    padding: 20px;
}
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}
.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px red;
}
button {
    background: red;
    border: none;
    padding: 10px;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}
footer {
    text-align: center;
    padding: 10px;
    background: #111;
}
</style>
</head>
<body><header>🐺 2M4B STORE</header><nav>
<a href="#home">الرئيسية</a>
<a href="#accounts">الحسابات</a>
<a href="#subs">الاشتراكات</a>
</nav><section id="home">
<h2>المنتجات</h2>
<div class="products">
<div class="card">
<h3>منتج رقمي 1</h3>
<p>10$</p>
<button onclick="buy()">شراء</button>
</div>
<div class="card">
<h3>منتج رقمي 2</h3>
<p>15$</p>
<button onclick="buy()">شراء</button>
</div>
</div>
</section><section id="accounts">
<h2>الحسابات</h2>
<div class="products">
<div class="card">
<h3>حساب نتفلكس</h3>
<p>5$</p>
<button onclick="buy()">شراء</button>
</div>
</div>
</section><section id="subs">
<h2>الاشتراكات</h2>
<div class="products">
<div class="card">
<h3>اشتراك شهر</h3>
<p>3$</p>
<button onclick="buy()">شراء</button>
</div>
</div>
</section><footer>© 2026 2M4B</footer><script>
function buy() {
    window.location.href = "https://instagram.com/2m4b";
}
</script></body>
</html>
