<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2M4B Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}
header {
    background: linear-gradient(90deg, red, black);
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}
nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: #111;
    padding: 10px;
}
nav a {
    color: white;
    text-decoration: none;
}
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}
.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 15px red;
}
.slider img {
    width: 100%;
    border-radius: 10px;
}
button {
    background: red;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 5px;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>🐺 2M4B STORE</header>

<nav>
<a href="#accounts">الحسابات</a>
<a href="#subs">الاشتراكات</a>
</nav>

<!-- الحسابات -->
<section id="accounts">
<h2 style="text-align:center;">الحسابات</h2>
<div class="products">

<!-- المنتج 1 -->
<div class="card">
<div class="slider" id="s1">
<img id="img1" src="images/account1.jpg">
</div>
<h3>حساب فورت نايت مميز</h3>
<p style="color: gold;">460﷼</p>
<button onclick="buy()">شراء</button>
</div>

<!-- المنتج 2 -->
<div class="card">
<div class="slider" id="s2">
<img id="img2" src="images/new1.jpg">
</div>
<h3>حساب ثاني</h3>
<p style="color: gold;">250﷼</p>
<button onclick="buy()">شراء</button>
</div>

<!-- المنتج 3 -->
<div class="card">
<div class="slider" id="s3">
<img id="img3" src="images/pic1.jpg">
</div>
<h3>pic</h3>
<p style="color: gold;">350﷼</p>
<button onclick="buy()">شراء</button>
</div>

</div>
</section>

<!-- الاشتراكات -->
<section id="subs">
<h2 style="text-align:center;">الاشتراكات</h2>
<div class="products">
<div class="card">
<h3>اشتراك شهر</h3>
<p style="color: gold;">50﷼</p>
<button onclick="buy()">شراء</button>
</div>
</div>
</section>

<script>
// function swipe
function slider(id, images){
let index = 0;
let startX = 0;

const container = document.getElementById(id);
const img = container.querySelector("img");

container.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

container.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if(startX - endX > 50){
        index = (index + 1) % images.length;
    } else if(endX - startX > 50){
        index = (index - 1 + images.length) % images.length;
    }

    img.src = images[index];
});
}

// المنتجات
slider("s1", [
"images/account1.jpg",
"images/account2.jpg",
"images/account3.jpg",
"images/account4.jpg",
"images/account5.jpg",
"images/account6.jpg",
"images/account7.jpg",
"images/account8.jpg"
]);

slider("s2", [
"images/new1.jpg",
"images/new2.jpg",
"images/new3.jpg",
"images/new4.jpg",
"images/new5.jpg",
"images/new6.jpg"
]);

slider("s3", [
"images/pic1.jpg",
"images/pic2.jpg",
"images/pic3.jpg",
"images/pic4.jpg"
]);

// زر شراء
function buy(){
window.location.href = "https://instagram.com/2m4b";
}
</script>

</body>
</html>
