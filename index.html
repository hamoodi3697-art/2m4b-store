<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2M4B Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    * {margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
    body {font-family:"Cairo",sans-serif;background:#050505;color:#fff;overflow-x:hidden;}
    header {position:sticky;top:0;z-index:1000;background:#080808;border-bottom:1px solid #222;}
    .topbar {display:flex;justify-content:space-between;align-items:center;padding:14px 16px;}
    .logo {font-size:24px;font-weight:800;}
    .logo span {color:#e5a93d;}
    .icon-btn {font-size:28px;cursor:pointer;}
    .menu-btn {color:#e5a93d;}
    .cart-btn {position:relative;}
    .cart-count {position:absolute;top:-8px;left:-8px;background:#e5a93d;color:#111;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;}
    .side-menu {position:fixed;top:0;right:-290px;width:290px;height:100%;background:#0d0d0d;z-index:2000;transition:0.3s;padding-top:80px;}
    .side-menu.active {right:0;}
    .close-btn {position:absolute;top:15px;left:20px;font-size:30px;cursor:pointer;}
    .side-menu a {display:block;padding:18px;color:#fff;border-bottom:1px solid #222;}
    .overlay {position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;z-index:1500;}
    .overlay.active {display:block;}
    .products-slider {display:flex;gap:16px;overflow-x:auto;padding:10px;}
    .product-card {flex:0 0 250px;background:#8b1f1f;border-radius:16px;overflow:hidden;}
    .slider img {width:100%;height:230px;object-fit:cover;}
    .product-content {padding:14px;text-align:center;}
    .product-content h3 {font-size:20px;margin-bottom:8px;}
    .price {color:#ffd15c;font-size:22px;font-weight:bold;margin-bottom:10px;}
    .add-cart-btn {width:100%;padding:10px;border:none;background:#111;color:#ffd15c;border-radius:10px;cursor:pointer;}
    footer {text-align:center;padding:20px;color:#aaa;}
  </style>
</head>

<body>

<header>
  <div class="topbar">
    <div class="icon-btn menu-btn" onclick="openMenu()">☰</div>
    <div class="logo">2M4B <span>STORE</span></div>
    <div class="icon-btn cart-btn" onclick="openCart()">🛒
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>
</header>

<div class="side-menu" id="sideMenu">
  <div class="close-btn" onclick="closeMenu()">×</div>
  <a href="#accounts">الحسابات</a>
  <a href="#subscriptions">الاشتراكات</a>
  <a href="#vbucks">فيبوكس</a>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<section id="accounts">
  <h2 style="text-align:center;">الحسابات</h2>
  <div class="products-slider">

    <div class="product-card">
      <div class="slider"><img src="images/account1.jpg"></div>
      <div class="product-content">
        <h3>حساب فورت نايت</h3>
        <div class="price">460﷼</div>
        <button class="add-cart-btn" onclick="addToCart('حساب فورت نايت',460)">أضف للسلة</button>
      </div>
    </div>

  </div>
</section>

<section id="subscriptions">
  <h2 style="text-align:center;">الاشتراكات</h2>
  <div class="products-slider">

    <div class="product-card">
      <div class="slider"><img src="images/net1.jpg"></div>
      <div class="product-content">
        <h3>نتفلكس 3 شهور</h3>
        <div class="price">50﷼</div>
        <button class="add-cart-btn" onclick="addToCart('نتفلكس',50)">أضف للسلة</button>
      </div>
    </div>

  </div>
</section>

<section id="vbucks">
  <h2 style="text-align:center;">فيبوكس</h2>
  <div class="products-slider">

    <div class="product-card">
      <div class="slider"><img src="images/vbucks1.jpg"></div>
      <div class="product-content">
        <h3>1000 V.B</h3>
        <div class="price">30﷼</div>
        <button class="add-cart-btn" onclick="addToCart('1000 V.B',30)">أضف للسلة</button>
      </div>
    </div>

  </div>
</section>

<footer>© 2M4B STORE</footer>

<script>
let cart=[];

function openMenu(){
  sideMenu.classList.add("active");
  overlay.classList.add("active");
}

function closeMenu(){
  sideMenu.classList.remove("active");
  overlay.classList.remove("active");
}

function closeAll(){
  closeMenu();
}

function addToCart(name,price){
  cart.push({name,price});
  document.getElementById("cartCount").innerText=cart.length;
}

function openCart(){
  alert("عدد المنتجات في السلة: "+cart.length);
}
</script>

</body>
</html>
